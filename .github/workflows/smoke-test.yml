name: smoke-test

# 三平台端到端冒烟,把 Windows/macOS/Linux 兼容从"应该能跑"变成"每个平台都验证过"。

on:
  push:
  pull_request:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: End-to-end smoke test
        run: python scripts/smoke_test.py
